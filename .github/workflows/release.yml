name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to Maven Central.'
        required: true
        type: boolean
        default: false
      version-name:
        description: 'Version name.'
        required: false
        type: string
      release-body:
        description: 'Release notes.'
        required: false
        type: string

jobs:
  publish:
    if: ${{ github.event.inputs.publish == 'true' }}
    uses: ./.github/workflows/publish.yml

  release:
    if: ${{ github.event.inputs.publish == 'false' || success() }}
    needs: [publish]
    uses: jenly1314/actions/.github/workflows/reusable-release.yml@v1
    with:
      version-name: ${{ github.event.inputs.version-name }}
      release-body: ${{ github.event.inputs.release-body }}

  docs:
    needs: [release]
    uses: ./.github/workflows/docs.yml
